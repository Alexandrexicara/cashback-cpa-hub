<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPA HUB - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .password-field {
            position: relative;
        }
        .password-field input {
            width: 100%;
            padding-right: 50px;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .toggle-password:hover {
            opacity: 1;
        }
        .toggle-password svg {
            width: 22px;
            height: 22px;
            fill: #666;
        }
        .forgot-password {
            text-align: right;
            margin: -10px 0 15px;
        }
        .forgot-password a {
            color: #667eea;
            font-size: 0.9rem;
            text-decoration: none;
            cursor: pointer;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }
        .modal-reset {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal-reset-content {
            background: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }
        .modal-reset-content h3 {
            margin-bottom: 20px;
            color: #333;
        }
        .close-modal {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
        }
        .close-modal:hover {
            color: #333;
        }
        .reset-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        .reset-message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .reset-message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>CPA HUB</h1>
            <p class="subtitle">Sistema de Afiliados Profissional</p>
            
            <!-- Abas -->
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('register')" id="tab-register">Criar Conta</button>
                <button class="tab-btn" onclick="showTab('login')" id="tab-login">Entrar</button>
            </div>
            
            <!-- Registro -->
            <div id="register-form" class="tab-content active">
                <input type="text" id="reg-name" placeholder="Nome completo" class="input-field">
                <input type="email" id="reg-email" placeholder="Email" class="input-field">
                <div class="password-field">
                    <input type="password" id="reg-password" placeholder="Senha" class="input-field">
                    <button type="button" class="toggle-password" onclick="togglePassword('reg-password', this)">
                        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    </button>
                </div>
                <input type="text" id="reg-pix" placeholder="Chave Pix (CPF, email ou telefone)" class="input-field">
                <button onclick="register()" class="btn-primary">Criar Conta</button>
            </div>
            
            <!-- Login -->
            <div id="login-form" class="tab-content">
                <input type="email" id="login-email" placeholder="Email" class="input-field">
                <div class="password-field">
                    <input type="password" id="login-password" placeholder="Senha" class="input-field">
                    <button type="button" class="toggle-password" onclick="togglePassword('login-password', this)">
                        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    </button>
                </div>
                <div class="forgot-password">
                    <a onclick="openResetModal()">Esqueceu a senha?</a>
                </div>
                <button onclick="login()" class="btn-primary">Entrar</button>
            </div>
            
            <p class="warning">
                ⚠️ Sistema técnico de tracking CPA.<br>
                Ganhos reais dependem das regras da rede (JoinAds).
            </p>
        </div>
    </div>

    <!-- Modal de Redefinição de Senha -->
    <div id="reset-modal" class="modal-reset">
        <div class="modal-reset-content">
            <span class="close-modal" onclick="closeResetModal()">&times;</span>
            <h3>🔐 Redefinir Senha</h3>
            <p style="margin-bottom: 20px; color: #666; font-size: 0.9rem;">
                Digite seu email. Se existir uma conta, enviaremos uma nova senha temporária.
            </p>
            <input type="email" id="reset-email" placeholder="Seu email cadastrado" class="input-field">
            <button onclick="resetPassword()" class="btn-primary" style="width: 100%;">
                Enviar Nova Senha
            </button>
            <div id="reset-message" class="reset-message"></div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab + '-form').classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            
            // Troca o ícone
            btn.innerHTML = isPassword 
                ? '<svg viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.2 2.2C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>'
                : '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>';
        }

        function openResetModal() {
            document.getElementById('reset-modal').style.display = 'block';
            document.getElementById('reset-message').className = 'reset-message';
            document.getElementById('reset-message').textContent = '';
        }

        function closeResetModal() {
            document.getElementById('reset-modal').style.display = 'none';
        }

        function resetPassword() {
            const email = document.getElementById('reset-email').value;
            const msgDiv = document.getElementById('reset-message');

            if (!email) {
                msgDiv.className = 'reset-message error';
                msgDiv.textContent = 'Digite seu email';
                return;
            }

            fetch('/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    msgDiv.className = 'reset-message error';
                    msgDiv.textContent = data.error;
                } else {
                    msgDiv.className = 'reset-message success';
                    msgDiv.textContent = 'Nova senha enviada para seu email! Verifique também a caixa de spam.';
                    setTimeout(() => {
                        closeResetModal();
                        document.getElementById('login-email').value = email;
                    }, 3000);
                }
            })
            .catch(err => {
                msgDiv.className = 'reset-message error';
                msgDiv.textContent = 'Erro ao redefinir senha. Tente novamente.';
            });
        }

        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const modal = document.getElementById('reset-modal');
            if (event.target === modal) {
                closeResetModal();
            }
        }

        function register() {
            const name = document.getElementById("reg-name").value;
            const email = document.getElementById("reg-email").value;
            const password = document.getElementById("reg-password").value;
            const pix_key = document.getElementById("reg-pix").value;

            if (!name || !email || !password || !pix_key) {
                alert("Preencha todos os campos");
                return;
            }

            fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, password, pix_key })
            })
            .then(r => r.json())
            .then(u => {
                if (u.error) {
                    alert(u.error);
                    return;
                }
                localStorage.setItem("subid", u.subid);
                localStorage.setItem("username", u.name);
                window.location = "/dashboard.html";
            })
            .catch(err => {
                alert("Erro ao criar conta. Tente novamente.");
            });
        }

        function login() {
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;

            if (!email || !password) {
                alert("Preencha email e senha");
                return;
            }

            fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            })
            .then(r => r.json())
            .then(u => {
                if (u.error) {
                    alert(u.error);
                    return;
                }
                localStorage.setItem("token", u.token);
                localStorage.setItem("subid", u.subid);
                localStorage.setItem("username", u.name);
                window.location = "/dashboard.html";
            })
            .catch(err => {
                alert("Erro ao fazer login. Tente novamente.");
            });
        }

        // Enter key support
        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener("keypress", function(e) {
                if (e.key === "Enter") {
                    if (document.getElementById('register-form').classList.contains('active')) {
                        register();
                    } else {
                        login();
                    }
                }
            });
        });
    </script>
</body>
</html>
