services:
  # Web Service
  - type: web
    name: cpa-hub
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cpa-hub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # PostgreSQL Database
  - type: pserv
    name: cpa-hub-db
    plan: free
    databaseName: cpahub
